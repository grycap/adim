components:
  schemas:
    Allocation:
      oneOf:
      - $ref: '#/components/schemas/OpenStackEnvironment'
      - $ref: '#/components/schemas/KubernetesEnvironment'
      - $ref: '#/components/schemas/EoscNodeEnvironment'
      title: Allocation
      discriminator:
        propertyName: kind
        mapping:
          EoscNodeEnvironment: '#/components/schemas/EoscNodeEnvironment'
          KubernetesEnvironment: '#/components/schemas/KubernetesEnvironment'
          OpenStackEnvironment: '#/components/schemas/OpenStackEnvironment'
    AllocationId:
      properties:
        kind:
          type: string
          enum:
          - AllocationId
          const: AllocationId
          title: Kind
          default: AllocationId
        id:
          type: string
          title: Id
          description: Unique identifier for this allocation
        infoLink:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Infolink
          description: Endpoint that returns more details about this entity
      type: object
      required:
      - id
      title: AllocationId
    AllocationInfo:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier for this allocation
        self:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Self
          description: Endpoint that returns the details of this allocation
        allocation:
          $ref: '#/components/schemas/Allocation'
      type: object
      required:
      - id
      - allocation
      title: AllocationInfo
    Deployment:
      properties:
        allocation:
          $ref: '#/components/schemas/AllocationId'
        tool:
          $ref: '#/components/schemas/ToolId'
        inputs:
          anyOf:
          - type: object
          - type: 'null'
          additionalProperties: {}
          type: object
          title: Inputs
          description: Input values for the template
      type: object
      required:
      - allocation
      - tool
      title: Deployment
    DeploymentId:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier for this deployment
        kind:
          type: string
          enum:
          - DeploymentId
          const: DeploymentId
          title: Kind
          default: DeploymentId
        infoLink:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Infolink
          description: Endpoint that returns more details about this entity
      type: object
      required:
      - id
      title: DeploymentId
    DeploymentInfo:
      properties:
        deployment:
          $ref: '#/components/schemas/Deployment'
        id:
          type: string
          title: Id
          description: Unique identifier for this tool blueprint
        status:
          type: string
          enum:
          - unknown
          - pending
          - running
          - stopped
          - 'off'
          - failed
          - configured
          - unconfigured
          - deleting
          - deleted
          title: Status
        details:
          anyOf:
          - type: string
          - type: 'null'
          title: Details
          description: Additional information about the deployment status
        outputs:
          anyOf:
          - type: object
          - type: 'null'
          additionalProperties: {}
          type: object
          title: Outputs
          description: Deployed Template output values
        self:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Self
          description: Endpoint that returns the details of this tool blueprint
      type: object
      required:
      - deployment
      - id
      - status
      title: DeploymentInfo
    EoscNodeEnvironment:
      properties:
        kind:
          type: string
          enum:
          - EoscNodeEnvironment
          const: EoscNodeEnvironment
          title: Kind
          default: EoscNodeEnvironment
        offer:
          $ref: '#/components/schemas/EoscNodeEnvironment_offer'
        projectId:
          type: string
          title: Projectid
        hostname:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Hostname
        provisionedOn:
          type: string
          format: date-time
          title: Provisionedon
        expiresOn:
          type: string
          format: date-time
          title: Expireson
        nodeName:
          anyOf:
          - type: string
          - type: 'null'
          title: Nodename
          description: Name of the EOSC node where this environment was allocated
        nodeId:
          type: string
          title: Nodeid
          description: URL to the interactive UI of the EOSC node where this environment
            was allocated
        awmApi:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Awmapi
          description: Base URL for the AWM API of the EOSC node where this environment
            was allocated, or null for environments private to the calling user that
            accessed via explicit credentials
      type: object
      required:
      - offer
      - projectId
      - nodeId
      - awmApi
      title: EoscNodeEnvironment
      description: Environment variables for EOSC node
    EoscNodeEnvironment_offer:
      properties:
        offerId:
          type: string
          title: Offerid
        offerName:
          type: string
          title: Offername
        offerType:
          type: string
          enum:
          - openstack
          - kubernetes
          title: Offertype
        cpus:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Cpus
        gpus:
          type: integer
          title: Gpus
        memory:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Memory
          description: RAM quota in GB
        fastStorage:
          anyOf:
          - type: integer
          - type: 'null'
          title: Faststorage
          description: SSD or NVMe based (fast) storage quota in GB
        bulkStorage:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bulkstorage
          description: HDD based (slow) storage quota in GB
        s3Storage:
          anyOf:
          - type: integer
          - type: 'null'
          title: S3Storage
          description: S3 storage quota in GB
        registryStorage:
          anyOf:
          - type: integer
          - type: 'null'
          title: Registrystorage
          description: Container Registry storage quota in GB
        creditsPerDay:
          type: integer
          minimum: 1.0
          title: Creditsperday
          description: Credits per day
      type: object
      required:
      - offerId
      - offerType
      - creditsPerDay
      title: EoscNodeEnvironment_offer
    Error:
      properties:
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
          description: Error type
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Error message
          default: Error
        details:
          anyOf:
          - type: object
          - type: 'null'
          title: Details
          description: Additional details about the error
      type: object
      title: Error
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    KubernetesEnvironment:
      properties:
        kind:
          type: string
          enum:
          - KubernetesEnvironment
          const: KubernetesEnvironment
          title: Kind
          default: KubernetesEnvironment
        host:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Host
      type: object
