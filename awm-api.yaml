      - Deployments
      summary: List existing deployments
      operationId: list_deployments_deployments_get
      security:
      - OIDC: []
      parameters:
      - name: from
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Index of the first element to return
          default: 0
          title: From
        description: Index of the first element to return
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Maximum number of elements to return
          default: 100
          title: Limit
        description: Maximum number of elements to return
      - name: allNodes
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Allnodes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfDeployments'
        '400':
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
