components:
  schemas:
    Allocation:
      discriminator:
        mapping:
          EoscNodeEnvironment: '#/components/schemas/EoscNodeEnvironment'
          KubernetesEnvironment: '#/components/schemas/KubernetesEnvironment'
          OpenStackEnvironment: '#/components/schemas/OpenStackEnvironment'
        propertyName: kind
      oneOf:
      - $ref: '#/components/schemas/EoscNodeEnvironment'
      - $ref: '#/components/schemas/OpenStackEnvironment'
      - $ref: '#/components/schemas/KubernetesEnvironment'
      title: Allocation
    AllocationId:
      properties:
        id:
          description: Unique identifier for this allocation
          title: Id
          type: string
        infoLink:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          description: Endpoint that returns more details about this entity
          title: Infolink
        kind:
          const: AllocationId
          default: AllocationId
          enum:
          - AllocationId
          title: Kind
          type: string
      required:
      - id
      title: AllocationId
      type: object
    AllocationInfo:
      properties:
        allocation:
          $ref: '#/components/schemas/Allocation'
        id:
          description: Unique identifier for this allocation
          title: Id
          type: string
        self:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          description: Endpoint that returns the details of this allocation
          title: Self
      required:
      - id
      - allocation
      title: AllocationInfo
      type: object
    Deployment:
      properties:
        allocation:
          $ref: '#/components/schemas/AllocationId'
        tool:
          $ref: '#/components/schemas/ToolId'
      required:
      - allocation
      - tool
      title: Deployment
      type: object
    DeploymentId:
      properties:
        id:
          description: Unique identifier for this deployment
          title: Id
          type: string
        infoLink:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          description: Endpoint that returns more details about this entity
          title: Infolink
        kind:
          const: DeploymentId
          default: DeploymentId
          enum:
          - DeploymentId
          title: Kind
          type: string
      required:
      - id
      title: DeploymentId
      type: object
    DeploymentInfo:
      properties:
        deployment:
          $ref: '#/components/schemas/Deployment'
        details:
          anyOf:
          - type: string
          - type: 'null'
          description: Additional information about the deployment status
          title: Details
        id:
          description: Unique identifier for this tool blueprint
          title: Id
          type: string
        self:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          description: Endpoint that returns the details of this tool blueprint
          title: Self
        status:
          enum:
          - unknown
          - pending
          - running
          - stopped
          - 'off'
          - failed
          - configured
          - unconfigured
          - deleting
          title: Status
          type: string
      required:
      - deployment
      - id
      - status
      title: DeploymentInfo
      type: object
    EoscNodeEnvironment:
      description: Environment variables for EOSC node
      properties:
        awmApi:
          description: Base URL for the AWM API of the EOSC node where this environment
            was allocated, or null for environments private to the calling user that
            accessed via explicit credentials
          format: uri
          maxLength: 2083
          minLength: 1
          title: Awmapi
          type: string
        expiresOn:
          format: date-time
          title: Expireson
          type: string
        hostname:
          format: uri
          maxLength: 2083
          minLength: 1
          title: Hostname
          type: string
        kind:
          const: EoscNodeEnvironment
          default: EoscNodeEnvironment
          enum:
          - EoscNodeEnvironment
          title: Kind
          type: string
        nodeId:
          description: URL to the interactive UI of the EOSC node where this environment
            was allocated
          title: Nodeid
          type: string
        nodeName:
          anyOf:
          - type: string
          - type: 'null'
          description: Name of the EOSC node where this environment was allocated
          title: Nodename
        offer:
          $ref: '#/components/schemas/EoscNodeEnvironment_offer'
        projectId:
          title: Projectid
          type: string
        provisionedOn:
          format: date-time
          title: Provisionedon
          type: string
      required:
      - offer
      - projectId
      - nodeId
      - awmApi
      title: EoscNodeEnvironment
      type: object
    EoscNodeEnvironment_offer:
      properties:
        bulkStorage:
          anyOf:
          - type: integer
          - type: 'null'
          description: HDD based (slow) storage quota in GB
          title: Bulkstorage
        cpus:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Cpus
        creditsPerDay:
          description: Credits per day
          minimum: 1.0
          title: Creditsperday
          type: integer
        fastStorage:
          anyOf:
          - type: integer
          - type: 'null'
          description: SSD or NVMe based (fast) storage quota in GB
          title: Faststorage
        gpus:
          title: Gpus
          type: integer
        memory:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          description: RAM quota in GB
          title: Memory
        offerId:
          title: Offerid
          type: string
        offerName:
          title: Offername
          type: string
        offerType:
          enum:
          - openstack
          - kubernetes
          title: Offertype
          type: string
        registryStorage:
          anyOf:
          - type: integer
          - type: 'null'
          description: Container Registry storage quota in GB
          title: Registrystorage
        s3Storage:
          anyOf:
          - type: integer
          - type: 'null'
          description: S3 storage quota in GB
          title: S3Storage
      required:
      - offerId
      - offerType
      - creditsPerDay
      title: EoscNodeEnvironment_offer
      type: object
    Error:
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          default: Error
          description: Error message
          title: Description
        details:
          anyOf:
          - type: object
          - type: 'null'
          description: Additional details about the error
          title: Details
        id:
          anyOf:
          - type: string
          - type: 'null'
          description: Error type
          title: Id
      title: Error
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    KubernetesEnvironment:
      description: Credentials for Kubernetes
      properties:
        host:
          format: uri
          maxLength: 2083
          minLength: 1
          title: Host
          type: string
        kind:
          const: KubernetesEnvironment
          default: KubernetesEnvironment
          enum:
          - KubernetesEnvironment
          title: Kind
          type: string
      required:
      - host
      title: KubernetesEnvironment
      type: object
    OpenStackEnvironment:
      description: Credentials for OpenStack
      properties:
        apiVersion:
          title: Apiversion
          type: string
        authVersion:
          const: 3.x-oidc
          default: 3.x-oidc
