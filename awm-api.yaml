        '419':
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Try again later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Deployments
      summary: Deploy workload to an EOSC environment or an infrastructure for which
        the user has credentials
      description: Deploy workload to an EOSC environment or an infrastructure for
        which the user has credentials
      operationId: deploy_workload_deployments_post
