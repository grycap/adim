[tox]
envlist = py3, style, bandit

[testenv]
skip_install=True
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
commands = python -m pytest adim/test --cov=adim --cov-report=term

[testenv:style]
skip_install = True
deps = pycodestyle
commands = pycodestyle --max-line-length=120

[testenv:bandit]
deps = bandit
commands = bandit -r adim -lll -iii -x tests/*

[flake8]
max-line-length = 120
ignore = F811